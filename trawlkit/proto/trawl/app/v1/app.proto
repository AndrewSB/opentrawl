syntax = "proto3";

package trawl.app.v1;

option go_package = "github.com/opentrawl/opentrawl/trawlkit/proto/trawl/app/v1;appv1";

message Count {
  string id = 1;
  string display = 2;
}

enum SetupKind {
  SETUP_KIND_UNSPECIFIED = 0;
  SETUP_KIND_FULL_DISK_ACCESS = 1;
  SETUP_KIND_PHOTOS_PERMISSION = 2;
  SETUP_KIND_ACCOUNT = 3;
  SETUP_KIND_PAIRING = 4;
  SETUP_KIND_ARCHIVE_IMPORT = 5;
}

enum SetupState {
  SETUP_STATE_UNSPECIFIED = 0;
  SETUP_STATE_READY = 1;
  SETUP_STATE_NEEDS_ACTION = 2;
  SETUP_STATE_UNAVAILABLE = 3;
}

enum SetupActionKind {
  SETUP_ACTION_KIND_UNSPECIFIED = 0;
  SETUP_ACTION_KIND_NONE = 1;
  SETUP_ACTION_KIND_OPEN_FULL_DISK_ACCESS = 2;
  SETUP_ACTION_KIND_REQUEST_PHOTOS = 3;
  SETUP_ACTION_KIND_RUN_COMMAND = 4;
  SETUP_ACTION_KIND_CHOOSE_ARCHIVE = 5;
}

message SetupRequirement {
  string id = 1;
  SetupKind kind = 2;
  SetupState state = 3;
  string explanation = 4;
  SetupActionKind action = 5;
  repeated string command = 6;
}

message SourceStatus {
  string app_id = 1;
  string surface = 2;
  string state = 3;
  string summary = 4;
  repeated Count counts = 5;
  string last_synced_display = 6;
  int64 archive_bytes = 7;
  repeated SetupRequirement setup_requirements = 8;
}

message SearchHit {
  string open_ref = 1;
  string app_id = 2;
  string title = 3;
  string snippet = 4;
  string when_display = 5;
}

enum OperationOutcome {
  OPERATION_OUTCOME_UNSPECIFIED = 0;
  OPERATION_OUTCOME_COMPLETE = 1;
  OPERATION_OUTCOME_PARTIAL = 2;
  OPERATION_OUTCOME_FAILED = 3;
}

enum FailureCode {
  FAILURE_CODE_UNSPECIFIED = 0;
  FAILURE_CODE_UNAVAILABLE = 1;
  FAILURE_CODE_PERMISSION = 2;
  FAILURE_CODE_AUTHENTICATION = 3;
  FAILURE_CODE_INVALID_INPUT = 4;
  FAILURE_CODE_NOT_FOUND = 5;
  FAILURE_CODE_TIMEOUT = 6;
  FAILURE_CODE_INTERNAL = 7;
}

message SourceFailure {
  string app_id = 1;
  string surface = 2;
  FailureCode code = 3;
  string message = 4;
  string remedy = 5;
}

message StatusResponse {
  OperationOutcome outcome = 1;
  repeated SourceStatus sources = 2;
  repeated SourceFailure failures = 3;
}

message SearchResponse {
  OperationOutcome outcome = 1;
  repeated SearchHit hits = 2;
  repeated SourceFailure failures = 3;
  uint32 result_limit = 4;
  bool truncated = 5;
}

message SyncSourceResult {
  string app_id = 1;
  string surface = 2;
  OperationOutcome outcome = 3;
  SourceFailure failure = 4;
}

message SyncResponse {
  OperationOutcome outcome = 1;
  repeated SyncSourceResult sources = 2;
  repeated SourceFailure failures = 3;
}

message OpenResponse {
  OperationOutcome outcome = 1;
  string app_id = 2;
  string open_ref = 3;
  bytes output = 4;
  SourceFailure failure = 5;
}
