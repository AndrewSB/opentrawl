syntax = "proto3";

package openclaw.clawdex.contactexport.v0;

message ContactExport {
  repeated Contact contacts = 1;
}

message Contact {
  string display_name = 1;
  repeated string phone_numbers = 2;
  repeated string emails = 3;

  // JSON-only fields:
  //   accounts: object whose keys are service names and values are string arrays.
  //   handles: object whose keys are service names and values are string arrays.
  // Example JSON:
  //   "accounts": {"telegram": ["ada"]},
  //   "handles": {"github": ["ada"]}
  //
  // Proto3 cannot express that JSON shape as map<string, repeated string>.
  reserved 4, 5;
}
